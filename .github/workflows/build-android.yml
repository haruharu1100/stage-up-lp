name: FGドリーム Androidアプリ ビルド

# 手動実行（Actionsタブの「Run workflow」ボタン）と、
# android-app配下を変更してpushした時に、インストール用APKを自動で組み立てる。
on:
  workflow_dispatch:
  push:
    paths:
      - 'fg-dream/android-app/**'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fg-dream/android-app
    steps:
      - name: ソース取得
        uses: actions/checkout@v4

      - name: Node.js 用意
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java(JDK 17) 用意
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK 用意
        uses: android-actions/setup-android@v3

      - name: 必要なAndroid SDK部品を導入（platform 34 / build-tools 34）
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses || true

      - name: 部品インストール
        run: npm ci

      - name: Capacitor 同期（自動生成ファイルを復元）
        run: npx cap sync android

      - name: APK 組み立て（デバッグ署名）
        run: |
          set -o pipefail
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log

      - name: 失敗時：エラーログをci-logブランチへ退避
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p ci-logs
          tail -n 250 /tmp/build.log > ci-logs/last-build-error.log || echo "ログ取得失敗" > ci-logs/last-build-error.log
          git config user.email "actions@github.com"
          git config user.name "gh-actions"
          git checkout -B ci-log
          git add -f ci-logs/last-build-error.log
          git commit -m "CI build error log [skip ci]"
          git push -f origin ci-log

      - name: 出来上がったAPKを保存
        uses: actions/upload-artifact@v4
        with:
          name: fg-dream-android-apk
          path: fg-dream/android-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
