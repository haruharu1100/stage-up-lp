name: FGドリーム Androidアプリ ビルド

# 手動実行（Actionsタブの「Run workflow」ボタン）と、
# android-app配下を変更してpushした時に、インストール用APKを自動で組み立てる。
on:
  workflow_dispatch:
  push:
    paths:
      - 'fg-dream/android-app/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fg-dream/android-app
    steps:
      - name: ソース取得
        uses: actions/checkout@v4

      - name: Node.js 用意
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java(JDK 17) 用意
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK 用意
        uses: android-actions/setup-android@v3

      - name: 部品インストール
        run: npm ci

      - name: APK 組み立て（デバッグ署名）
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: 出来上がったAPKを保存
        uses: actions/upload-artifact@v4
        with:
          name: fg-dream-android-apk
          path: fg-dream/android-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
